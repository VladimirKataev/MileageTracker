<!doctype html>
<html lang="en-US">
    <head>
        <title>Mileage Tracker</title>
        <link rel="stylesheet" href="style.css" />
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <link rel="manifest" href="manifest.json" />
        <link rel="icon" href="icons/icon-512.png" />
    </head>
    <body>
        <h1>Mileage tracker</h1>
    <form>
        <fieldset>
        <legend>Enter Date, Fuel Consumed, Distance Travelled, Odometer</legend>
        <p>
            <label for="date">Date</label>
            <input type="date" id="date" required />
        </p>
        <p>
            <label for="fuelConsumed">Fuel Consumed</label>
            <input type="number" id="fuelConsumed" required step="0.1" min="0"/>
        </p>
        <p>
            <label for="distanceTravelled">Trip Distance</label>
            <input type="number" id="distanceTravelled" required step="0.1" min="0"/>
        </p>
        <p>
            <label for="odometer">Total Odometrage</label>
            <input type="number" id="odometer" step="0.1" min="0"/>
        </p>
        </fieldset>
        <p>
            <button type="submit">Record</button>
        </p>
    </form>
    <section id="pastTrips"></section>
    <script src="app.js" defer></script>
    </body>
</html>
