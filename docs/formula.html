    <body>
        <h1>Gas optimization optimization</h1>
        <h2><a href="index.html">Mileage tracker</a></h2>
        <math display="block"><mtable>
            <mtr> <mtd><msub><mtext>F</mtext><mtext>cost</mtext></msub>(speed) = <!-- Fcost(speed) = F(time) + F(money) -->
                    <msub><mtext>F</mtext><mtext>timeCost</mtext> </msub>(speed) + 
                    <msub> <mtext>F</mtext> <mtext>fuelCost</mtext> </msub>(speed) </mtd> </mtr>
            <mtr> <mtd> <msub><mtext>F</mtext><mtext>cost</mtext></msub>(v) = <!-- Fcost(speed) = pd/v + F(money) | explained -->
                    <mfrac><mtext>pd</mtext> <mtext>v</mtext></mfrac> +
                    <msub> <mtext>F</mtext> <mtext>fuelCost</mtext> </msub>(v) </mtd>
                    <mtd><mtext> Where p is money/time, d is distance, and v is distance/time </mtext>  </mtd> </mtr>
        </mtable></math>
